openapi: 3.0.3
info:
  title: Payment Service API
  description: API сервиса платежей для витрины интернет-магазина.
  version: 1.0.0
servers:
  - url: http://localhost:8081
    description: Локальный сервис платежей
tags:
  - name: payments
    description: Операции с балансом и платежами
paths:
  /payments/balance:
    get:
      tags:
        - payments
      operationId: getBalance
      summary: Получить текущий баланс
      responses:
        '200':
          description: Текущий баланс получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '503':
          description: Сервис платежей временно недоступен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /payments/pay:
    post:
      tags:
        - payments
      operationId: pay
      summary: Выполнить платёж
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '200':
          description: Платёж успешно выполнен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Некорректная сумма платежа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Недостаточно средств для выполнения платежа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '503':
          description: Сервис платежей временно недоступен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    BalanceResponse:
      type: object
      required:
        - balance
      properties:
        balance:
          type: integer
          format: int64
          minimum: 0
          example: 10000
    PaymentRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: integer
          format: int64
          minimum: 1
          example: 2500
    PaymentResponse:
      type: object
      required:
        - success
        - balance
      properties:
        success:
          type: boolean
          example: true
        balance:
          type: integer
          format: int64
          minimum: 0
          example: 7500
        message:
          type: string
          example: Недостаточно средств
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Сервис платежей временно недоступен
