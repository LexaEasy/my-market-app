services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "8082:8080"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/my-market
    ports:
      - "8081:8081"

  market-app:
    build:
      context: .
      dockerfile: market-app/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      payment-service:
        condition: service_started
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_PAYMENT_SERVICE_BASE_URL: http://payment-service:8081
      PAYMENT_SERVICE_CLIENT_SECRET: dev-payment-secret
      KEYCLOAK_LOGIN_CLIENT_SECRET: dev-login-secret
      KEYCLOAK_AUTHORIZATION_URI: http://localhost:8082/realms/my-market/protocol/openid-connect/auth
      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/my-market/protocol/openid-connect/token
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/my-market/protocol/openid-connect/certs
    ports:
      - "8080:8080"
