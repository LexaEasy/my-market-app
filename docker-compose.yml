services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/payments/balance || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    ports:
      - "8081:8081"

  market-app:
    build:
      context: .
      dockerfile: market-app/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_PAYMENT_SERVICE_BASE_URL: http://payment-service:8081
    ports:
      - "8080:8080"
